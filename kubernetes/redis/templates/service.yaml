apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  annotations:
    app.kubernetes.io/name: {{ .Values.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: {{ .Values.name }}
